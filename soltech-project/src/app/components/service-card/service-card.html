<div class="service-card">
  <div class="service-card-image-container">
    <app-replacement-image
      [src]="service.imageUrl"
      [alt]="service.name"
      [className]="'service-card-image'"
    ></app-replacement-image>
    <div class="service-card-favorite">
      <button (click)="toggleFavorite.emit(service.id)" class="service-card-favorite-button">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          [attr.fill]="isFavorite ? 'currentColor' : 'none'"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          [class]="'icon-favorite' + (isFavorite ? ' active' : '')"
        >
          <path
            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
          />
        </svg>
      </button>
    </div>
    <div class="service-card-badge">
      <span class="service-badge">{{ service.category }}</span>
    </div>
  </div>

  <div class="service-card-content">
    <h3 class="service-card-title">{{ service.name }}</h3>
    <p class="service-card-description line-clamp-2">{{ service.description }}</p>

    <a [routerLink]="['/services', service.id]" class="service-card-link">
      Ver más
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="service-card-link-icon"
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="5" y1="12" x2="19" y2="12" />
        <polyline points="12 5 19 12 12 19" />
      </svg>
    </a>
  </div>
</div>
