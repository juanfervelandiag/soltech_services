@if (didError) {
  <div [class]="'image-fallback-wrapper ' + (className ?? '')" [ngStyle]="imgStyle">
    <div class="image-fallback-content">
      <img [src]="errorSrc" alt="Error loading image" />
    </div>
  </div>
} @else {
  <img [src]="src" [alt]="alt" [class]="className" [ngStyle]="imgStyle" (error)="onError()" />
}
